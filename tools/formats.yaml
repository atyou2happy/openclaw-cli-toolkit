category: formats
description: "Document format processing tools — PDF, Excel, CSV, JSON, Markdown, HTML, XML"
tools:
  - name: qpdf
    package: qpdf
    binary: qpdf
    description: "PDF manipulation toolkit — merge, split, rotate, encrypt, linearize, and inspect PDFs"
    homepage: "https://github.com/qpdf/qpdf"
    license: Apache-2.0
    install_methods:
      - method: apt
        package: qpdf
      - method: brew
        package: qpdf
    openclaw_usage:
      replace: "manual PDF manipulation tools"
      examples:
        - "qpdf --merge a.pdf b.pdf --output merged.pdf    # merge PDFs"
        - "qpdf --split-pages input.pdf output-%d.pdf      # split into pages"
        - "qpdf --rotate=+90:1,3 input.pdf rotated.pdf     # rotate pages"
        - "qpdf --encrypt user-pass owner-pass 256 -- input.pdf enc.pdf  # encrypt"
        - "qpdf --decrypt encrypted.pdf decrypted.pdf       # decrypt"
        - "qpdf --check input.pdf                           # inspect/validate"
      benefits: "PDF merge, split, rotate, encrypt, decrypt, linearize, and validate — all from CLI"

  - name: img2pdf
    package: img2pdf
    binary: img2pdf
    description: "Lossless image-to-PDF converter — JPEG/PNG/TIFF/GIF to PDF without re-encoding"
    homepage: "https://github.com/josch/img2pdf"
    license: LGPL-3.0
    install_methods:
      - method: pip
        package: img2pdf
      - method: apt
        package: img2pdf
    openclaw_usage:
      replace: "libreoffice/convert for image-to-PDF"
      examples:
        - "img2pdf img.jpg -o output.pdf                     # single image"
        - "img2pdf *.jpg -o album.pdf                        # multiple images"
        - "img2pdf --pagesize A4 img.png -o page.pdf         # A4 page size"
        - "img2pdf --imgsize 10cmx15cm photo.jpg -o out.pdf  # custom size"
      benefits: "Lossless image-to-PDF conversion (JPEG pixels copied directly, no re-compression)"

  - name: visidata
    package: visidata
    binary: vd
    description: "Terminal spreadsheet viewer and data explorer — reads xlsx, csv, json, sqlite, HTML tables, and 40+ formats"
    homepage: "https://github.com/saulpw/visidata"
    license: GPL-3.0
    install_methods:
      - method: pip
        package: visidata
      - method: apt
        package: visidata
      - method: brew
        package: visidata
    openclaw_usage:
      replace: "excel GUI, manual CSV inspection"
      examples:
        - "vd data.xlsx                       # open Excel file"
        - "vd data.csv                        # open CSV"
        - "vd data.json                       # open JSON"
        - "vd database.sqlite                 # open SQLite"
        - "vd *.csv                           # browse multiple files"
        - "vd -b data.csv -f csv -o out.json  # batch convert CSV to JSON"
      benefits: "Interactive TUI data viewer for 40+ formats including xlsx/csv/json/sql — filter, sort, pivot, aggregate"

  - name: xsv
    package: xsv
    binary: xsv
    description: "Fast CSV/TSV command-line toolkit — index, slice, join, stats, search, and convert"
    homepage: "https://github.com/BurntSushi/xsv"
    license: MIT
    install_methods:
      - method: cargo
        package: xsv
      - method: brew
        package: xsv
    openclaw_usage:
      replace: "awk/sort/cut for CSV processing"
      examples:
        - "xsv index data.csv                  # create index for fast access"
        - "xsv slice data.csv -s 100 -l 50     # slice rows 100-149"
        - "xsv select name,email data.csv      # select columns"
        - "xsv join id a.csv id b.csv           # join two CSVs"
        - "xsv stats data.csv                   # compute statistics"
        - "xsv search -s name 'pattern' data.csv # search in column"
        - "xsv frequency data.csv               # frequency table"
      benefits: "Blazing-fast CSV operations — indexing, slicing, joining, stats, dedup, and search in Rust"

  - name: gron
    package: gron
    binary: gron
    description: "Flatten JSON for grep-friendly searching — makes JSON a line-oriented format"
    homepage: "https://github.com/tomnomnom/gron"
    license: MIT
    install_methods:
      - method: apt
        package: gron
      - method: brew
        package: gron
      - method: cargo
        package: gron
    openclaw_usage:
      replace: "jq '.key.subkey' for exploration"
      examples:
        - "gron data.json                     # flatten JSON"
        - "gron data.json | grep 'author'     # grep for keys"
        - "gron data.json | grep 'price' | gron -u  # extract subset"
        - "curl -s api/endpoint | gron        # flatten API response"
      benefits: "Turn JSON into grep-able lines, then unflatten back — perfect for exploring unknown JSON structures"

  - name: markdownlint-cli
    package: markdownlint-cli
    binary: markdownlint
    description: "Markdown linting and style checking — enforces consistent Markdown formatting"
    homepage: "https://github.com/igorshubovych/markdownlint-cli"
    license: MIT
    install_methods:
      - method: brew
        package: markdownlint-cli
      - method: pip
        package: markdownlint-cli
    openclaw_usage:
      replace: "manual Markdown style review"
      examples:
        - "markdownlint .                           # lint all Markdown files"
        - "markdownlint README.md                   # lint single file"
        - "markdownlint --fix .                     # auto-fix issues"
        - "markdownlint --config .markdownlintrc .  # custom config"
      benefits: "Catch Markdown style issues — heading order, trailing spaces, line length, blank lines, link format"

  - name: lychee
    package: lychee
    binary: lychee
    description: "Fast link checker for Markdown, HTML, and plain text — validates URLs and local links"
    homepage: "https://github.com/lycheeverse/lychee"
    license: MIT
    install_methods:
      - method: cargo
        package: lychee
      - method: brew
        package: lychee
      - method: github_release
        package: lycheeverse/lychee#lychee
    openclaw_usage:
      replace: "manual link verification"
      examples:
        - "lychee README.md                    # check links in file"
        - "lychee .                            # check all links in repo"
        - "lychee --exclude-mail *.md          # skip mailto links"
        - "lychee --max-redirects 3 README.md  # limit redirects"
        - "lychee --format json README.md      # JSON output"
      benefits: "Fast async link checking for Markdown/HTML — finds broken URLs, supports rate limiting and retries"

  - name: htmlq
    package: htmlq
    binary: htmlq
    description: "HTML parser with CSS selectors — like jq but for HTML, extract elements and attributes"
    homepage: "https://github.com/mgdm/htmlq"
    license: MIT
    install_methods:
      - method: cargo
        package: htmlq
      - method: brew
        package: htmlq
    openclaw_usage:
      replace: "grep/sed for HTML parsing"
      examples:
        - "htmlq 'a' -a href page.html              # extract all links"
        - "htmlq 'h1' --text page.html               # extract h1 text"
        - "htmlq 'img' -a src page.html              # extract image URLs"
        - "htmlq '.post' --text page.html            # extract by class"
        - "htmlq '#main' -a innerHTML page.html      # extract inner HTML"
        - "curl -s example.com | htmlq 'title' --text # parse live page"
      benefits: "Parse HTML with familiar CSS selectors — extract text, attributes, and elements from any HTML"

  - name: tidy
    package: tidy
    binary: tidy
    description: "HTML/XHTML/XML formatter, validator, and cleaner — fix malformed markup automatically"
    homepage: "https://github.com/htacg/tidy-html5"
    license: MIT
    install_methods:
      - method: apt
        package: tidy
      - method: brew
        package: tidy-html5
    openclaw_usage:
      replace: "manual HTML formatting and validation"
      examples:
        - "tidy -i -m page.html                  # indent and modify in-place"
        - "tidy -o clean.html messy.html         # clean and output"
        - "tidy -q -e page.html                  # validate (errors only)"
        - "tidy --show-body-only yes page.html   # clean body only"
        - "tidy -xml -i data.xml                 # format XML"
        - "tidy -asxhtml page.html               # convert HTML to XHTML"
      benefits: "Auto-fix malformed HTML/XHTML/XML, validate, pretty-print, and convert between formats"

  - name: libxml2-utils
    package: libxml2-utils
    binary: xmllint
    description: "XML validator and XPath query tool — validate, lint, query, and format XML documents"
    homepage: "https://gitlab.gnome.org/GNOME/libxml2"
    license: MIT
    install_methods:
      - method: apt
        package: libxml2-utils
      - method: brew
        package: libxml2
    openclaw_usage:
      replace: "manual XML validation and inspection"
      examples:
        - "xmllint --noout data.xml             # validate well-formedness"
        - "xmllint --schema schema.xsd data.xml # validate against XSD"
        - "xmllint --xpath '//item/@id' data.xml # XPath query"
        - "xmllint --format data.xml             # pretty-print XML"
        - "xmllint --c14n data.xml               # canonical XML output"
        - "xmllint --shell data.xml              # interactive XML shell"
      benefits: "XML validation, XPath queries, pretty-printing, and canonical form — the standard XML Swiss army knife"

  - name: xmlstarlet
    package: xmlstarlet
    binary: xmlstarlet
    description: "XML transformation toolkit — edit, select, validate, transform, and query XML documents"
    homepage: "https://xmlstar.sourceforge.net/"
    license: MIT
    install_methods:
      - method: apt
        package: xmlstarlet
      - method: brew
        package: xmlstarlet
    openclaw_usage:
      replace: "manual XML editing and XSLT processing"
      examples:
        - "xmlstarlet sel -t -v '//name' data.xml        # select values"
        - "xmlstarlet ed -d '//removed' data.xml         # delete elements"
        - "xmlstarlet ed -s //root -t elem -n new -v val  # add elements"
        - "xmlstarlet fo data.xml                         # format XML"
        - "xmlstarlet val data.xml                        # validate"
        - "xmlstarlet tr transform.xsl data.xml           # apply XSLT"
      benefits: "Full XML editing, selection, validation, XSLT transformation, and formatting — ed/sel/val/tr in one tool"

  - name: weasyprint
    package: weasyprint
    binary: weasyprint
    description: "Visual rendering engine for HTML/CSS to PDF — supports CSS Paged Media, @page rules, and print layout"
    homepage: "https://github.com/Kozea/WeasyPrint"
    license: BSD-3-Clause
    install_methods:
      - method: pip
        package: weasyprint
      - method: brew
        package: weasyprint
    openclaw_usage:
      replace: "wkhtmltopdf, browser print-to-PDF"
      examples:
        - "weasyprint page.html output.pdf              # HTML to PDF"
        - "weasyprint https://example.com output.pdf    # URL to PDF"
        - "weasyprint - <<'EOF' output.pdf              # stdin to PDF"
        - "weasyprint doc.html - > doc.pdf              # stdout PDF"
        - "weasyprint --stylesheet print.css doc.html out.pdf  # custom CSS"
        - "weasyprint --presentational-hints doc.html out.pdf  # use HTML hints"
      benefits: "High-quality HTML/CSS-to-PDF with full CSS support, @page rules, page breaks, headers/footers, and print media queries"

  - name: yamllint
    package: yamllint
    binary: yamllint
    description: "YAML linter — checks syntax, formatting, and common errors in YAML files"
    homepage: "https://github.com/adrienverge/yamllint"
    license: GPL-3.0
    install_methods:
      - method: apt
        package: yamllint
      - method: brew
        package: yamllint
      - method: pip
        package: yamllint
    openclaw_usage:
      replace: "manual YAML validation"
      examples:
        - "yamllint .                                # lint all YAML"
        - "yamllint docker-compose.yml               # lint single file"
        - "yamllint -d relaxed .                     # relaxed mode"
        - "yamllint -f parsable .                    # machine-readable output"
      benefits: "Catch YAML errors before they break CI/CD — line length, trailing spaces, key duplicates, indentation"

  - name: taplo
    package: taplo-cli
    binary: taplo
    description: "TOML toolkit — format, lint, and validate TOML files"
    homepage: "https://github.com/tamasfe/taplo"
    license: MIT
    install_methods:
      - method: brew
        package: taplo
      - method: cargo
        package: taplo-cli
    openclaw_usage:
      replace: "manual TOML editing and validation"
      examples:
        - "taplo format Cargo.toml                   # format TOML"
        - "taplo check .                             # lint all TOML"
        - "taplo fmt --check .                       # check formatting"
        - "taplo get Cargo.toml package.name          # get value"
      benefits: "TOML formatting, linting, validation, and querying — essential for Rust projects and modern configs"
