tools:
- name: aider
  package_name: aider
  category: ai
  description: AI pair programming in your terminal - edits code with LLMs
  usage: aider
  best_for: AI pair programming, Git integration, multi-file edits, multiple LLM support
  replaces: manual AI-assisted coding
  examples:
  - 'aider                            # start interactive session'
  - 'aider file1.py file2.py          # add files to context'
  - 'aider --model gpt-4              # specify model'
  - 'aider --yes-always               # auto-accept changes'
  install_methods:
  - method: pip
    package: aider-chat
  - method: brew
    package: aider
- name: llm
  package_name: llm
  category: ai
  description: CLI tool for running LLM prompts from Simon Willison
  usage: llm 'explain this code'
  best_for: Multi-provider LLM access, conversation history, templates, embeddings
  replaces: API calls to LLMs
  examples:
  - 'llm ''explain this code''          # quick prompt'
  - 'llm -m gpt-4 ''complex prompt''    # specify model'
  - 'cat file.py | llm ''review this''   # pipe input'
  - 'llm -s ''summarize'' < article.txt  # system prompt'
  - 'llm --save prompt ''template''       # save as template'
  install_methods:
  - method: pip
    package: llm
  - method: brew
    package: llm
- name: sgpt
  package_name: sgpt
  category: ai
  description: Shell-GPT - use GPT from terminal for shell commands and code
  usage: sgpt 'list all python files'
  best_for: Shell command generation, code generation, chat mode, reusability
  replaces: searching StackOverflow
  examples:
  - 'sgpt ''list all python files''     # get shell command'
  - 'sgpt --shell ''find big files''    # shell command mode'
  - 'sgpt --code ''sort dict by value'' # code mode'
  - 'sgpt -s ''my error message''       # explain error'
  install_methods:
  - method: pip
    package: shell-gpt
  - method: brew
    package: shell-gpt
- name: zstd
  package_name: zstd
  category: archive
  description: Fast real-time compression algorithm, replacing gzip/xz
  usage: zstd file.txt
  best_for: Faster than gzip, better ratio than xz, multi-threaded, streaming
  replaces: gzip/xz/bzip2
  examples:
  - 'zstd file.txt                   # compress'
  - 'zstd -d file.txt.zst            # decompress'
  - tar --zstd -cf archive.tar.zst dir/
  - 'zstd -19 file.txt               # max compression'
  - 'zstd -T0 file.txt               # multi-threaded'
  - tar -I zstd -cf archive.tar.zst dir/
  install_methods:
  - method: apt
    package: zstd
  - method: brew
    package: zstd
- name: ouch
  package_name: ouch
  category: archive
  description: Painless compression and decompression in the terminal
  usage: ouch compress file.txt file.gz
  best_for: Universal decompression, auto-detects format, simple interface
  replaces: tar/unzip/gzip/7z etc.
  examples:
  - 'ouch compress file.txt file.gz   # compress'
  - 'ouch decompress archive.tar.gz   # decompress'
  - ouch compress dir/ output.tar.zst
  - 'ouch list archive.zip            # list contents'
  install_methods:
  - method: brew
    package: ouch
  - method: cargo
    package: ouch
- name: 7z
  package_name: p7zip
  category: archive
  description: 7-Zip file archiver with high compression ratio
  usage: 7z a archive.7z dir/
  best_for: High compression ratio, multi-format support, password protection
  replaces: unzip for .7z files
  examples:
  - '7z a archive.7z dir/             # create archive'
  - '7z x archive.7z                  # extract'
  - '7z l archive.7z                  # list contents'
  - '7z a -mx=9 archive.7z dir/       # max compression'
  install_methods:
  - method: apt
    package: p7zip-full
  - method: brew
    package: p7zip
- name: jq
  package_name: jq
  category: data
  description: Lightweight and flexible command-line JSON processor
  usage: jq '.' file.json
  best_for: Powerful query language, streaming, zero-dependency, universal JSON tool
  replaces: python -m json.tool
  examples:
  - 'jq ''.'' file.json                          # pretty print'
  - 'jq ''.items[].name'' file.json              # extract array field'
  - 'jq -r ''.url'' file.json                    # raw string output'
  - 'jq ''keys'' file.json                       # list keys'
  - 'jq ''. | select(.age > 30)'' file.json      # filter objects'
  - 'jq -s ''sort_by(.age) | reverse'' *.json    # sort multiple files'
  - 'jq -n ''{count: [inputs] | length}'' *.json  # count across files'
  - 'jq ''map_values(. + 1)'' file.json          # transform all values'
  install_methods:
  - method: apt
    package: jq
  - method: brew
    package: jq
- name: yq
  package_name: yq
  category: data
  description: Portable command-line YAML, JSON, XML, CSV, TSV processor
  usage: yq '.' file.yaml
  best_for: Read/write YAML/JSON/XML/CSV, jq-like syntax, format conversion
  replaces: manual YAML editing
  examples:
  - 'yq ''.'' file.yaml                    # pretty print YAML'
  - 'yq ''.name'' file.yaml                # extract field'
  - 'yq ''.items[0].name'' file.yaml       # array access'
  - 'yq -i ''.version = "2.0"'' file.yaml # in-place edit'
  - 'yq eval ''.a.b.c = "new"'' file.yaml # set nested value'
  - 'yq -o json ''.'' file.yaml            # convert YAML to JSON'
  - 'yq -o yaml ''.'' file.json            # convert JSON to YAML'
  install_methods:
  - method: brew
    package: yq
  - method: pip
    package: yq
- name: mlr
  package_name: miller
  category: data
  description: Miller is like awk, sed, cut, join, and sort for name-indexed data
    such as CSV, TSV, and tabular JSON
  usage: mlr --csv cat data.csv
  best_for: CSV/TSV/JSON processing, statistics, joins, reshaping, format conversion
  replaces: awk for CSV
  examples:
  - 'mlr --csv cat data.csv                   # display CSV'
  - 'mlr --csv sort -f name data.csv           # sort by field'
  - 'mlr --csv filter ''$age > 30'' data.csv     # filter rows'
  - 'mlr --csv cut -f name,age data.csv        # select columns'
  - mlr --csv stats1 -a sum,mean -f age data.csv
  - mlr --csv --from data.csv put '$ratio = $a / $b'
  install_methods:
  - method: apt
    package: miller
  - method: brew
    package: miller
- name: csvcut
  package_name: csvkit
  category: data
  description: A suite of command-line tools for working with CSV
  usage: csvcut -n data.csv
  best_for: Complete CSV toolkit, SQL-like queries, format conversion
  replaces: manual CSV processing
  examples:
  - 'csvcut -n data.csv                       # list column names'
  - 'csvcut -c 1,3 data.csv                   # select columns'
  - 'csvgrep -c 2 -m ''pattern'' data.csv       # grep in CSV'
  - 'csvstat data.csv                          # statistics'
  - 'csvjson data.csv                          # convert to JSON'
  - 'csvlook data.csv                          # pretty table view'
  install_methods:
  - method: pip
    package: csvkit
- name: fx
  package_name: fx
  category: data
  description: Terminal JSON viewer and processor
  usage: fx data.json
  best_for: Interactive JSON explorer, JavaScript expressions, mouse support
  replaces: jq for interactive use
  examples:
  - 'fx data.json                     # interactive viewer'
  - 'fx data.json ''.items''            # extract field'
  - 'cat data.json | fx .             # pipe mode'
  install_methods:
  - method: brew
    package: fx
  - method: pip
    package: fx
- name: dasel
  package_name: dasel
  category: data
  description: Select, put and delete data from JSON, TOML, YAML, XML and CSV files
  usage: dasel select -f data.json '.name'
  best_for: Unified interface for JSON/YAML/TOML/XML/CSV, single binary
  replaces: jq + yq + toml manipulation
  examples:
  - 'dasel select -f data.json ''.name''          # select from JSON'
  - 'dasel put string -f data.yaml ''.name'' ''new'' # update YAML'
  - 'dasel select -f data.toml ''.database.host'' # select from TOML'
  - 'dasel delete -f data.json ''.temp''           # delete field'
  install_methods:
  - method: brew
    package: dasel
  - method: cargo
    package: dasel
- name: shellcheck
  package_name: shellcheck
  category: dev
  description: Static analysis tool for shell scripts
  usage: shellcheck script.sh
  best_for: Catches common bugs, suggests fixes, CI/CD integration, comprehensive
    checks
  replaces: manual bash script review
  examples:
  - 'shellcheck script.sh            # check script'
  - 'shellcheck -S warning script.sh  # severity threshold'
  - 'shellcheck -f json script.sh     # JSON output'
  - 'shellcheck -e SC2086 script.sh   # exclude specific check'
  - 'shellcheck **/*.sh               # check all shell scripts'
  install_methods:
  - method: apt
    package: shellcheck
  - method: brew
    package: shellcheck
  - method: cargo
    package: shellcheck
