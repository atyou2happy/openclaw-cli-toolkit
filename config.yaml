# OpenClaw CLI Toolkit Configuration
# Edit this file to customize which tools are installed.
# Run: ./install.sh to apply changes.

# Installation preferences
installation:
  package_manager_priority:
    - apt
    - brew
    - cargo
    - pip
  parallel: false
  max_jobs: 4

