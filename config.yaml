# OpenClaw CLI Toolkit Configuration
# Edit this file to customize which tools are installed.
# Run: ./install.sh to apply changes.

# Installation preferences
installation:
  package_manager_priority:
    - apt
    - brew
    - cargo
    - pip
  parallel: false
  max_jobs: 4

# Categories to install (set enabled: false to skip)
categories:
  search:
    enabled: true
    tools:
      ripgrep:
        enabled: true
      fd:
        enabled: true
      the_silver_searcher:
        enabled: false
      ack:
        enabled: false
      ast-grep:
        enabled: true

  viewer:
    enabled: true
    tools:
      bat:
        enabled: true
      eza:
        enabled: true
      lsd:
        enabled: false
      tree:
        enabled: true

  data:
